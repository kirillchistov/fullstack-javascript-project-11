<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RSS агрегатор</title>
  </head>
  <body>
    <div class="page-wrapper">
      <header class="hero py-5">
        <div class="container">
          <div class="row justify-content-center">
            <div class="col-12 col-lg-8 col-xl-7">
              <h1 class="hero-title mb-3" data-i18n="title"></h1>
              <p class="hero-text mb-4" data-i18n="description"></p>

              <form class="rss-form" novalidate>
                <label
                  for="url"
                  class="form-label hero-label mb-2"
                  data-i18n="form.label"
                ></label>
              
                <div class="row g-3 rss-controls">
                  <div class="col-9 col-sm-10 col-md-9">
                    <input
                      id="url"
                      name="url"
                      type="text"
                      class="form-control form-control-lg rss-input"
                      aria-label="Ссылка RSS"
                      required
                      autofocus
                    />
                  </div>
              
                  <div class="col-3 col-sm-2 col-md-3 d-grid">
                    <button
                      type="submit"
                      class="btn btn-light btn-lg rss-submit"
                    >
                      <span class="btn-text" data-i18n="form.submit"></span>
                    </button>
                  </div>
                </div>
              
                <div class="feedback mt-2"></div>
                <div class="form-text rss-hint" data-i18n="form.example"></div>
              </form>
            </div>
          </div>
        </div>
      </header>

      <main class="content-area py-5">
        <div class="container">
          <div class="row justify-content-center">
            <div class="col-12 col-xl-10">
              <div class="row g-4">
                <div class="col-12 col-lg-7">
                  <div class="posts"></div>
                </div>
                <div class="col-12 col-lg-5">
                  <div class="feeds"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>

      <footer class="footer py-3">
        <div class="container text-center">
          <span data-i18n="footer.createdBy"></span>
          <a href="https://ru.hexlet.io/" target="_blank" rel="noopener noreferrer">Hexlet</a>
        </div>
      </footer>
    </div>

    <script type="module" src="/src/application.js"></script>
  </body>
</html>
