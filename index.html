<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RSS агрегатор</title>
  </head>
  <body>
    <div class="page-wrapper">
      <header class="hero py-5">
        <div class="container">
          <div class="row justify-content-center">
            <div class="col-lg-8 col-xl-7">
              <h1 class="hero-title mb-3">RSS агрегатор</h1>
              <p class="hero-text mb-4">
                Начните читать RSS сегодня! Это легко, это красиво.
              </p>

              <form class="rss-form">
                <div class="row g-3 align-items-start">
                  <div class="col-md-9">
                    <label for="url" class="visually-hidden">RSS URL</label>
                    <input
                      id="url"
                      name="url"
                      type="text"
                      class="form-control form-control-lg rss-input"
                      placeholder="Ссылка RSS"
                    />
                    <div class="form-text rss-hint">
                      Пример: https://lorem-rss.hexlet.app/feed
                    </div>
                  </div>
                  <div class="col-md-3 d-grid">
                    <button type="submit" class="btn btn-light btn-lg rss-submit">
                      Добавить
                    </button>
                  </div>
                </div>
              </form>
            </div>
          </div>
        </div>
      </header>

      <main class="content-area"></main>

      <footer class="footer py-3">
        <div class="container text-center">
          created by
          <a href="https://ru.hexlet.io/" target="_blank" rel="noopener noreferrer">Hexlet</a>
        </div>
      </footer>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
